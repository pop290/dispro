<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>@popzzi</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #050507;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Prevent scrollbars from bouncing stars */
            position: relative;
        }

        /* ──── CLICK TO ENTER OVERLAY ──── */
        #enter-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #050507;
            z-index: 999999; /* Always on top initially */
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: opacity 1s ease, visibility 1s ease;
        }

        .enter-text {
            font-size: 1.2rem;
            letter-spacing: 4px;
            color: rgba(255, 255, 255, 0.7);
            text-transform: uppercase;
            animation: pulse 2s infinite ease-in-out;
            font-weight: 300;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
        }

        @keyframes pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.98); }
            50% { opacity: 1; transform: scale(1.02); text-shadow: 0 0 15px rgba(255, 255, 255, 0.6); }
        }

        /* Ambient background image setup */
        .background-katana {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://images.unsplash.com/photo-1615111784767-4d7c413f120d?q=80&w=1920');
            background-size: cover;
            background-position: center;
            z-index: 1; /* Lowest layout layer */
            opacity: 0.2;
        }

        /* Scanline Overlay Effect */
        .scanlines {
            position: fixed;
            top: 0; left: 0; bottom: 0; right: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            z-index: 2; /* Below stars and card container */
            background-size: 100% 3px;
            pointer-events: none;
            opacity: 0.4;
        }

        /* Falling Snow/Stars Animation */
        .snow-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1000000; 
            pointer-events: none;
        }

        .snowflake {
            position: absolute;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: fall linear infinite;
        }

        @keyframes fall {
            0% { transform: translateY(-10px) translateX(0); opacity: 0; }
            10% { opacity: 0.6; }
            90% { opacity: 0.4; }
            100% { transform: translateY(105vh) translateX(20px); opacity: 0; }
        }

        /* Profile Card Container Layout Layer */
        .profile-wrapper {
            position: relative;
            width: 100%;
            max-width: 680px; /* Adjusted to fit the long row comfortably */
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 40px 20px;
            z-index: 10; /* Keeps profile card fully functional and clickable */
            opacity: 0; /* Hidden initially, fades in after click */
            transform: translateY(20px);
            transition: opacity 1.5s ease, transform 1.5s ease;
        }

        /* Class added via JS after enter click */
        .profile-wrapper.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* Screen-wide Orbiting/Bouncing Neon Stars - MAX Z-INDEX OVERLAY */
        .orbit-star {
            position: fixed; 
            top: 0;
            left: 0;
            font-size: 1rem;
            pointer-events: none;
            z-index: 99999; /* Absolute top layer so they float freely over everything */
            color: #ffffff;
            will-change: transform;
            transition: color 0.15s ease;
        }

        /* Profile Card Styles */
        .profile-container {
            background: transparent;
            width: 100%;
            text-align: center;
            padding: 20px;
            background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 0%, rgba(0,0,0,0) 70%);
        }

        .avatar-wrapper {
            position: relative;
            width: 95px;
            height: 95px;
            margin: 0 auto 15px;
        }

        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 1.5px solid rgba(255, 255, 255, 0.4);
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.2));
        }

        .status-dot {
            position: absolute;
            bottom: 4px;
            right: 4px;
            width: 12px;
            height: 12px;
            background-color: #00ff66;
            border-radius: 50%;
            border: 2px solid #050507;
            box-shadow: 0 0 8px #00ff66;
        }

        /* Center Star Emblem */
        .star-badge {
            font-size: 1.8rem;
            color: #ffffff;
            margin-bottom: 5px;
            animation: spin 8s linear infinite;
            display: inline-block;
            filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.6));
        }

        .sparkle-text-container {
            position: relative;
            display: inline-block;
            margin-bottom: 8px;
        }

        h1 {
            font-size: 2.6rem;
            font-weight: 700;
            color: #ffffff;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5), 0 0 30px rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            position: relative;
        }

        .sparkle-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://assets.guns.lol/sparkle_white.gif');
            background-size: cover;
            mix-blend-mode: screen;
            pointer-events: none;
            opacity: 0.9;
        }

        .bio {
            color: #cccccc;
            font-size: 0.9rem;
            margin-bottom: 25px;
            text-shadow: 0 0 8px rgba(0, 0, 0, 0.5);
        }

        /* Music Player Widget with Volume Controls */
        .music-player {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(5px);
            border-radius: 30px;
            padding: 10px 22px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            margin-bottom: 35px;
            max-width: 380px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        .player-main-content {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .music-icon {
            color: #ffffff;
            font-size: 1rem;
        }

        .track-info {
            text-align: left;
        }

        .track-title {
            font-size: 0.8rem;
            font-weight: 600;
            color: #ffffff;
            white-space: nowrap;
        }

        .track-artist {
            font-size: 0.7rem;
            color: #999999;
        }

        /* Volume Control Area */
        .volume-container {
            display: flex;
            align-items: center;
            gap: 0;
            position: relative;
            padding-left: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .volume-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            cursor: pointer;
            font-size: 0.9rem;
            transition: color 0.2s ease;
            padding: 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .volume-btn:hover {
            color: #ffffff;
        }

        .volume-slider-wrapper {
            width: 0;
            overflow: hidden;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            align-items: center;
        }

        /* Hover Effect: Show slider when hovering over the container */
        .volume-container:hover .volume-slider-wrapper {
            width: 75px;
            margin-left: 5px;
        }

        .volume-slider {
            -webkit-appearance: none;
            width: 100%;
            height: 4px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }

        .volume-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ffffff;
            cursor: pointer;
            box-shadow: 0 0 5px rgba(255, 255, 255, 0.8);
            transition: transform 0.1s;
        }

        .volume-slider::-webkit-slider-thumb:hover {
            transform: scale(1.2);
        }

        /* Social Links Layout Row - MODIFIED FOR SINGLE ROW */
        .links-container {
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            gap: 12px;
            width: 100%;
            max-width: 100%;
            margin: 10px auto 0 auto;
            padding: 10px;
            flex-wrap: nowrap; /* Prevent icons from breaking into multiple rows */
            overflow-x: visible; /* Standard display allows tools to be visible */
        }

        .link-wrapper {
            position: relative;
            display: inline-block;
            flex-shrink: 0; /* Prevent icons from squeezing/shrinking */
        }

        .link-card {
            text-decoration: none;
            color: #ffffff;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            display: flex;
            justify-content: center;
            align-items: center;
            width: 46px;
            height: 46px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .link-card i {
            font-size: 1.25rem;
            color: #ffffff;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.2));
            transition: all 0.3s ease;
        }

        .link-card:hover {
            transform: scale(1.2);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 15px var(--hover-glow, rgba(255, 255, 255, 0.4));
            border-color: var(--hover-glow, rgba(255, 255, 255, 0.4));
        }

        .link-card:hover i {
            filter: drop-shadow(0 0 8px var(--hover-glow, #ffffff));
        }

        /* Tooltip Popup Styling */
        .tooltip-text {
            visibility: hidden;
            width: auto;
            min-width: 75px;
            background-color: rgba(10, 10, 15, 0.9);
            color: #fff;
            text-align: center;
            border: 1px solid var(--hover-glow, rgba(255, 255, 255, 0.3));
            border-radius: 6px;
            padding: 5px 8px;
            position: absolute;
            z-index: 10;
            bottom: 130%;
            left: 50%;
            transform: translateX(-50%) translateY(10px);
            opacity: 0;
            font-size: 0.75rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.5), 0 0 8px var(--hover-glow, transparent);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }

        .tooltip-text::after {
            content: "";
            position: absolute;
            top: 100%;
            left: 50%;
            margin-left: -5px;
            border-width: 5px;
            border-style: solid;
            border-color: rgba(10, 10, 15, 0.9) transparent transparent transparent;
        }

        .link-wrapper:hover .tooltip-text {
            visibility: visible;
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* Responsive Mobile Layout Tweaks - CLEAN HORIZONTAL SCROLL FOR MOBILE */
        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }
            .links-container {
                gap: 10px;
                overflow-x: auto; /* Enable side-scroll if device is too narrow */
                justify-content: flex-start; /* Align from start for smoother scrolling */
                padding: 15px 10px;
                max-width: 92vw;
                -webkit-overflow-scrolling: touch;
                -ms-overflow-style: none;  
                scrollbar-width: none;  
            }
            .links-container::-webkit-scrollbar {
                display: none; /* Hide messy mobile scrollbars */
            }
            .link-card {
                width: 42px;
                height: 42px;
            }
            .link-card i {
                font-size: 1.1rem;
            }
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
    </style>
</head>

    <!-- Logic Setup JavaScript -->
    <script>
        /* ──── ENTER SCREEN LOGIC ──── */
        const enterOverlay = document.getElementById('enter-overlay');
        const profileWrapper = document.getElementById('profile-wrapper');
        const bgMusic = document.getElementById('bg-music');
        const discIcon = document.getElementById('disc-icon');

        enterOverlay.addEventListener('click', () => {
            enterOverlay.style.opacity = '0';
            enterOverlay.style.pointerEvents = 'none';
            profileWrapper.classList.add('show');
    
    // සින්දුව කෙලින්ම play කරන්න මෙන්න මෙහෙම විතරක් දාන්න:
            bgMusic.play().catch(error => console.log("Audio play blocked: ", error));

            setTimeout(() => {
                enterOverlay.style.display = 'none';
            }, 1000);
        });

        /* ──── VOLUME & MUTE CONTROL LOGIC ──── */
        const volumeControl = document.getElementById('volume-control');
        const volumeToggle = document.getElementById('volume-toggle');
        const volumeIcon = document.getElementById('volume-icon');
        let previousVolume = 1;

        bgMusic.volume = volumeControl.value;

        volumeControl.addEventListener('input', (e) => {
            const currentVolume = e.target.value;
            bgMusic.volume = currentVolume;
            updateVolumeIcon(currentVolume);
            
            if (currentVolume > 0) {
                previousVolume = currentVolume;
            }
        });

        volumeToggle.addEventListener('click', () => {
            if (bgMusic.volume > 0) {
                previousVolume = bgMusic.volume;
                bgMusic.volume = 0;
                volumeControl.value = 0;
                updateVolumeIcon(0);
            } else {
                bgMusic.volume = previousVolume;
                volumeControl.value = previousVolume;
                updateVolumeIcon(previousVolume);
            }
        });

        function updateVolumeIcon(volume) {
            volumeIcon.className = "fa-solid";
            if (volume == 0) {
                volumeIcon.classList.add("fa-volume-xmark");
                discIcon.style.animationPlayState = "paused";
            } else if (volume < 0.4) {
                volumeIcon.classList.add("fa-volume-low");
                discIcon.style.animationPlayState = "running";
            } else {
                volumeIcon.classList.add("fa-volume-high");
                discIcon.style.animationPlayState = "running";
            }
        }

        /* Ambient Background Micro-Sparks Setup */
        const snowContainer = document.getElementById('snow');
        const flakeCount = 35;

        for (let i = 0; i < flakeCount; i++) {
            const flake = document.createElement('div');
            flake.classList.add('snowflake');
            flake.style.left = Math.random() * 100 + 'vw';
            flake.style.animationDuration = (Math.random() * 5 + 4) + 's';
            flake.style.animationDelay = Math.random() * 5 + 's';
            flake.style.width = flake.style.height = (Math.random() * 2.5 + 1) + 'px';
            snowContainer.appendChild(flake);
        }

        /* Title Auto-Typing Loop */
        const titleText = "@popzzi | Portfolio";
        let currentIdx = 0;
        let isDeleting = false;
        let typingSpeed = 220; 

        function animateTitleLoop() {
            if (!isDeleting && currentIdx <= titleText.length) {
                document.title = titleText.substring(0, currentIdx) || " ";
                currentIdx++;
                typingSpeed = 200; 
            } else if (isDeleting && currentIdx >= 0) {
                document.title = titleText.substring(0, currentIdx) || " ";
                currentIdx--;
                typingSpeed = 100; 
            }

            if (currentIdx > titleText.length) {
                isDeleting = true;
                currentIdx = titleText.length; 
                typingSpeed = 2500; 
            } else if (currentIdx < 0) {
                isDeleting = false;
                currentIdx = 0;
                typingSpeed = 800; 
            }

            setTimeout(animateTitleLoop, typingSpeed);
        }
        animateTitleLoop();

        /* Free Roaming Neon Stars Setup */
        const starContainer = document.getElementById('star-container');
        const neonColors = [
            '#00f2fe', '#00ff66', '#ff007f', '#ff00ff', 
            '#ffff00', '#00ffff', '#ff3333', '#9d4edd'
        ];
        const activeStars = [];
        const totalFreeStars = 5;

        for(let i=0; i < totalFreeStars; i++) {
            const starEl = document.createElement('i');
            starEl.className = "fa-solid fa-star orbit-star";
            starContainer.appendChild(starEl);

            activeStars.push({
                element: starEl,
                x: Math.random() * (window.innerWidth - 30),
                y: Math.random() * (window.innerHeight - 30),
                dx: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? 1 : -1),
                dy: (Math.random() * 3 + 1.5) * (Math.random() < 0.5 ? 1 : -1),
                size: 16
            });
        }

        function updateStarsPhysicsAnimation() {
            const wWidth = window.innerWidth;
            const wHeight = window.innerHeight;

            activeStars.forEach(star => {
                star.x += star.dx;
                star.y += star.dy;

                let hitWall = false;

                if (star.x <= 0) {
                    star.x = 0;
                    star.dx = -star.dx;
                    hitWall = true;
                } else if (star.x >= wWidth - star.size) {
                    star.x = wWidth - star.size;
                    star.dx = -star.dx;
                    hitWall = true;
                }

                if (star.y <= 0) {
                    star.y = 0;
                    star.dy = -star.dy;
                    hitWall = true;
                } else if (star.y >= wHeight - star.size) {
                    star.y = wHeight - star.size;
                    star.dy = -star.dy;
                    hitWall = true;
                }

                if (hitWall) {
                    const pickedColor = neonColors[Math.floor(Math.random() * neonColors.length)];
                    star.element.style.color = pickedColor;
                    star.element.style.filter = `drop-shadow(0 0 10px ${pickedColor}) drop-shadow(0 0 20px ${pickedColor})`;
                }

                star.element.style.transform = `translate3d(${star.x}px, ${star.y}px, 0)`;
            });

            requestAnimationFrame(updateStarsPhysicsAnimation);
        }
        
        updateStarsPhysicsAnimation();

        window.addEventListener('resize', () => {
            activeStars.forEach(star => {
                if (star.x > window.innerWidth) star.x = window.innerWidth - star.size;
                if (star.y > window.innerHeight) star.y = window.innerHeight - star.size;
            });
        });
    </script>
</body>
</html>
